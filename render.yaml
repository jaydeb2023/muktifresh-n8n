services:
  - type: web
    name: muktifresh-n8n
    env: docker
    dockerImage: n8nio/n8n
    plan: free
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: "admin"
      - key: N8N_BASIC_AUTH_PASSWORD
        value: "muktifresh2026"
      - key: N8N_HOST
        value: "muktifresh-n8n.onrender.com"
      - key: N8N_PROTOCOL
        value: "https"
      - key: WEBHOOK_URL
        value: "https://muktifresh-n8n.onrender.com"
      - key: GENERIC_TIMEZONE
        value: "Asia/Kolkata"
      - key: N8N_PORT
        value: "5678"
